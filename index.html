<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>校園鬼屋探險 </title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

    <h1>🏫 校園鬼屋探險 </h1>

    <img id="sceneImage" src="images/basement.jpg">

    <div id="bars">

        <div class="bar">
            <div id="hpBar">HP 100/100</div>
        </div>

        <div class="bar">
            <div id="sanBar">SAN 100/100</div>
        </div>

        <div class="rain" id="rain"></div>

    </div>

    <div id="status"></div>

    <div id="story"></div>

    <div id="buttons"></div>

    <div id="flash"></div>

    <div id="fog"></div>

</div>

<audio id="bgm" loop>
    <source src="audio/bgm.mp3">
</audio>

<script src="game.js"></script>

</body>
</html>
